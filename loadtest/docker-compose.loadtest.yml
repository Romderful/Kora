services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kora_loadtest
      POSTGRES_USER: kora
      POSTGRES_PASSWORD: kora
    ports:
      - "5433:5432"
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - track_io_timing=on
      - -c
      - log_lock_waits=on
      - -c
      - deadlock_timeout=500ms
      - -c
      - log_min_duration_statement=50
    volumes:
      - loadtest-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kora"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  loadtest-pgdata:
